name: Monitor Forum

on:
  schedule:
    # 每30分钟运行 (分别指定第0分和第30分，避免GitHub的*/30合并bug)
    - cron: '0 * * * *'
    - cron: '30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          FORUM_USERNAME: ${{ secrets.FORUM_USERNAME }}
          FORUM_PASSWORD: ${{ secrets.FORUM_PASSWORD }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_AUTH_CODE: ${{ secrets.EMAIL_AUTH_CODE }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python monitor.py

      - name: Commit seen_ids cache
        run: |
          git config --local user.name "forum-monitor[bot]"
          git config --local user.email "forum-monitor[bot]@users.noreply.github.com"
          git add seen_ids.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update seen_ids [skip ci]"
          git push
